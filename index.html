<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Tasks - Pokémon TCG Edition</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --brawl-yellow: #FFF200;
            --brawl-purple: #4E148C;
            --brawl-blue: #00A6FF;
            --brawl-orange: #FF5500;
            --brawl-green: #10D010;
            --brawl-pink: #FF007F;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle, #2c0b5e 0%, #120326 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .brawl-font {
            font-family: 'Luckiest Guy', cursive;
            letter-spacing: 2px;
            -webkit-text-stroke: 2px #000;
            text-shadow: 4px 4px 0px #000;
        }
        .login-container {
            max-width: 450px;
            margin: 10vh auto;
            background: rgba(0, 0, 0, 0.5);
            border: 6px solid #000;
            border-radius: 25px;
            box-shadow: 0px 15px 0px rgba(0,0,0,0.3);
        }
        .brawl-btn {
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.4rem;
            color: white !important;
            text-shadow: 2px 2px 0px #000;
            -webkit-text-stroke: 1px #000;
            border: 4px solid #000;
            border-radius: 15px;
            box-shadow: 0px 6px 0px #000;
            transition: all 0.1s ease;
        }
        .brawl-btn:active { transform: translateY(6px); box-shadow: 0px 0px 0px #000; }
        .btn-yellow { background-color: var(--brawl-yellow); color: #000 !important; text-shadow: none; -webkit-text-stroke: 0px; }
        .btn-blue { background-color: var(--brawl-blue); }
        .btn-orange { background-color: var(--brawl-orange); }
        .btn-green { background-color: var(--brawl-green); }
        .btn-pink { background-color: var(--brawl-pink); }

        .brawl-card {
            background: #2b1055;
            border: 4px solid #000;
            border-radius: 20px;
            box-shadow: 0px 8px 0px #000;
            margin-bottom: 20px;
        }
        .brawl-progress-container {
            background: #111; border: 4px solid #000; border-radius: 20px; padding: 4px; height: 38px; position: relative;
        }
        .brawl-progress-bar {
            background: linear-gradient(to bottom, #00ffcc, #00a6ff);
            height: 100%; border-radius: 12px; width: 0%; transition: width 0.5s ease-in-out;
        }
        .brawl-progress-text {
            position: absolute; width: 100%; text-align: center; top: 4px; left: 0;
            font-family: 'Luckiest Guy', cursive; font-size: 1.2rem;
            text-shadow: 2px 2px 0px #000; -webkit-text-stroke: 1px #000;
        }
        .pokemon-card-wrapper {
            background: #111;
            padding: 6px; border: 4px solid #000; border-radius: 16px; box-shadow: 0 6px 0 #000;
            transition: transform 0.2s; display: inline-block; width: 100%;
        }
        .pokemon-card-wrapper:hover { transform: scale(1.05) rotate(1deg); }
        .pokemon-card-img { width: 100%; height: auto; border-radius: 10px; display: block; }
        
        .pokemon-modal .modal-content {
            background: radial-gradient(circle, #8a2be2 0%, #1a0536 100%);
            border: 8px solid var(--brawl-yellow); border-radius: 30px;
            box-shadow: 0px 0px 60px rgba(255, 242, 0, 0.8);
        }
        .pokemon-glow { position: relative; animation: pulseGlow 1.5s infinite alternate; }
        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 15px rgba(255,242,0,0.5)); }
            100% { filter: drop-shadow(0 0 45px rgba(255,242,0,1)); }
        }
        .pokemon-img-modal { max-width: 240px; border-radius: 14px; animation: cardSpawn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes cardSpawn { 0% { transform: scale(0.1) rotate(-45deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        .brawl-badge {
            background: #000; padding: 4px 10px; border-radius: 10px; display: inline-block; border: 2px solid #fff; font-family: 'Luckiest Guy', cursive;
        }
        .badge-xp { background-color: var(--brawl-blue); }
        .badge-money { background-color: var(--brawl-green); }
        .nav-tabs .nav-link { color: #fff; font-family: 'Luckiest Guy', cursive; font-size: 1.2rem; border: 4px solid transparent;}
        .nav-tabs .nav-link.active { background-color: var(--brawl-orange) !important; border: 4px solid #000 !important; border-bottom: transparent!important; border-radius: 15px 15px 0 0; }
    </style>
</head>
<body>

    <!-- CONNEXION -->
    <div id="loginPage" class="container">
        <div class="login-container p-5 text-center animate__animated animate__zoomIn">
            <h1 class="brawl-font text-warning mb-2" style="font-size: 3.5rem;">BRAWL TASKS</h1>
            <h3 class="brawl-font text-light mb-5" style="font-size: 1.4rem;">Édition Vraies Cartes</h3>
            <div class="mb-3 text-start">
                <label class="form-label fw-bold">Qui es-tu ?</label>
                <select id="usernameSelect" class="form-select form-select-lg bg-dark text-white border-secondary">
                    <option value="">Chargement des membres...</option>
                </select>
            </div>
            <div class="mb-4 text-start d-none" id="passwordGroup">
                <label class="form-label fw-bold">Mot de passe secret (Parents)</label>
                <input type="password" id="password" class="form-control form-control-lg bg-dark text-white border-secondary" placeholder="1234">
            </div>
            <button onclick="handleLogin()" class="btn brawl-btn btn-yellow w-100 py-3 mt-2">C'EST PARTI !</button>
            <div id="loginError" class="text-danger mt-3 fw-bold"></div>
        </div>
    </div>

    <!-- APP DASHBOARD -->
    <div id="appPage" class="container py-4 d-none">
        <div class="brawl-card p-4 animate__animated animate__fadeInDown">
            <div class="row align-items-center">
                <div class="col-md-4 text-center text-md-start">
                    <h2 class="brawl-font text-warning mb-1" id="displayUsername">JOUEUR</h2>
                    <span class="badge bg-danger brawl-font fs-5 me-2" id="displayLevel">NIVEAU 1</span>
                    <span class="badge bg-success brawl-font fs-5" id="displayMoney">0.00 $</span>
                </div>
                <div class="col-md-8 mt-3 mt-md-0">
                    <label class="brawl-font text-info mb-1">NIVEAU XP PROCHAIN POKÉMON</label>
                    <div class="brawl-progress-container">
                        <div id="xpBar" class="brawl-progress-bar"></div>
                        <div id="xpText" class="brawl-progress-text">0 / 100 XP</div>
                    </div>
                </div>
            </div>
        </div>

        <ul class="nav nav-tabs border-0 mb-4" id="appTabs">
            <li class="nav-item"><button class="nav-link active" id="taches-tab" data-bs-toggle="tab" data-bs-target="#tachesTab">À Faire</button></li>
            <li class="nav-item"><button class="nav-link" id="collection-tab" data-bs-toggle="tab" data-bs-target="#collectionTab" onclick="fetchCollectionEtEchanges()">Ma Collection</button></li>
            <li class="nav-item"><button class="nav-link" id="echanges-tab" data-bs-toggle="tab" data-bs-target="#echangesTab">Échanges</button></li>
            <li class="nav-item"><button class="nav-link" id="admin-tab" data-bs-toggle="tab" data-bs-target="#adminTab" style="background-color: var(--brawl-purple);">Parents (Admin)</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="tachesTab"><div id="tachesList" class="row g-3"></div></div>
            <div class="tab-pane fade" id="collectionTab"><div id="pokemonGrid" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-4"></div></div>

            <!-- ONGLET ÉCHANGES -->
            <div class="tab-pane fade" id="echangesTab">
                <div class="brawl-card p-4">
                    <h3 class="brawl-font text-warning mb-3">Proposer un échange 1 vs 1</h3>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Échanger avec :</label>
                            <select id="tradeTargetSelect" class="form-select bg-dark text-white border-secondary"></select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Offrir ma carte :</label>
                            <select id="tradeMyCardSelect" class="form-select bg-dark text-white border-secondary"></select>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button onclick="proposerEchange()" class="btn brawl-btn btn-blue w-100">Envoyer le Deal !</button>
                        </div>
                    </div>
                    <hr class="border-secondary my-4">
                    <h4 class="brawl-font text-info">Requêtes d'échanges</h4>
                    <div id="echangesList" class="mt-3"></div>
                </div>
            </div>

            <!-- PANEL ADMIN -->
            <div class="tab-pane fade" id="adminTab">
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="brawl-card p-4">
                            <h3 class="brawl-font text-warning mb-3">Donner une Mission</h3>
                            <div class="mb-3"><label class="form-label">Quoi faire ?</label><input type="text" id="taskDesc" class="form-control bg-dark text-white border-secondary"></div>
                            <div class="row mb-3">
                                <div class="col"><label class="form-label">XP</label><input type="number" id="taskXp" class="form-control bg-dark text-white border-secondary" value="30"></div>
                                <div class="col"><label class="form-label">Argent ($)</label><input type="number" step="0.05" id="taskMoney" class="form-control bg-dark text-white border-secondary" value="0.50"></div>
                            </div>
                            <div class="mb-4"><label class="form-label">Pour qui ?</label><select id="taskAssignSelect" class="form-select bg-dark text-white border-secondary"></select></div>
                            <button onclick="creerNouvelleTache()" class="btn brawl-btn btn-orange w-100">Lancer la tâche !</button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="brawl-card p-4">
                            <h3 class="brawl-font text-warning mb-3">Créer un Nouveau Joueur</h3>
                            <div class="mb-4"><label class="form-label">Nom de l'enfant</label><input type="text" id="newMemberName" class="form-control bg-dark text-white border-secondary"></div>
                            <button onclick="creerMembreAdmin()" class="btn brawl-btn btn-green w-100">Ajouter l'enfant !</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div class="modal fade pokemon-modal" id="rewardModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4 text-center animate__animated animate__jackInTheBox">
                <h1 class="brawl-font text-warning animate__animated animate__pulse animate__infinite" style="font-size: 3.5rem;">LEVEL UP !</h1>
                <p class="fs-4 text-info fw-bold" id="rewardModalText">Nouvelle carte débloquée !</p>
                <div class="pokemon-glow my-4">
                    <img id="rewardCardImg" src="" class="pokemon-img-modal">
                    <h2 class="brawl-font text-white mt-3" id="rewardCardName">POKÉMON</h2>
                </div>
                <button id="rewardNextBtn" onclick="nextRewardCard()" class="btn brawl-btn btn-yellow px-5 py-3 fs-4">SUIVANT !</button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="tradeDecisionModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-light p-4 text-center text-white" style="border-radius:20px;">
                <h2 class="brawl-font text-info mb-3">DEMANDE D'ÉCHANGE !</h2>
                <p id="tradeDecisionText" class="fs-5"></p>
                <div class="d-flex gap-3 justify-content-center mt-4">
                    <button id="btnAcceptTrade" class="btn brawl-btn btn-green px-4">ACCEPTER</button>
                    <button id="btnRefuseTrade" class="btn brawl-btn btn-pink px-4">REFUSER</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzwth2Aqwna9nDCezwrWRiJLUuyW0C8lmkvKiOFvF1IefL4SbyzxrA9tUJwHP6RFFPN/exec";

        let currentUser = null, userRole = null, currentLocalState = -1, idMembreSession = null;
        let pendingCards = [], checkedTrades = [], lastLevel = -1, myLocalOwnedIds = [];

        window.addEventListener('DOMContentLoaded', fetchMembresPourListes);

        function fetchMembresPourListes() {
            fetch(`${API_URL}?action=getMembres`)
                .then(res => res.json())
                .then(membres => {
                    let netMembres = Array.isArray(membres) ? membres.filter(m => m) : [];
                    if (!netMembres.includes('Admin')) netMembres.unshift('Admin');
                    buildDropdowns(netMembres);
                }).catch(() => buildDropdowns(['Admin']));
        }

        function buildDropdowns(membres) {
            const loginSelect = document.getElementById('usernameSelect');
            const assignSelect = document.getElementById('taskAssignSelect');
            const targetTradeSelect = document.getElementById('tradeTargetSelect');
            
            loginSelect.innerHTML = '<option value="">-- Choisis ton nom --</option>';
            assignSelect.innerHTML = '<option value="Tous">Tout le monde</option>';
            targetTradeSelect.innerHTML = '<option value="">-- Choisis la cible --</option>';
            
            membres.forEach(m => {
                loginSelect.innerHTML += `<option value="${m}">${m}</option>`;
                if (m !== 'Admin') {
                    assignSelect.innerHTML += `<option value="${m}">${m}</option>`;
                    targetTradeSelect.innerHTML += `<option value="${m}">${m}</option>`;
                }
            });
        }

        document.getElementById('usernameSelect').addEventListener('change', function(e) {
            document.getElementById('passwordGroup').classList.toggle('d-none', e.target.value !== 'Admin');
        });

        function handleLogin() {
            const user = document.getElementById('usernameSelect').value;
            const pass = document.getElementById('password').value;
            if (!user) return;

            fetch(`${API_URL}?action=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`)
                .then(res => res.json())
                .then(response => {
                    if (response.success) {
                        currentUser = response.user;
                        userRole = response.role;
                        document.getElementById('loginPage').classList.add('d-none');
                        document.getElementById('appPage').classList.remove('d-none');
                        document.getElementById('displayUsername').innerText = currentUser.toUpperCase();
                        document.getElementById('admin-tab').style.display = (userRole === 'admin') ? 'block' : 'none';

                        setInterval(checkRealtimeUpdate, 4000);
                        checkRealtimeUpdate();
                    } else {
                        document.getElementById('loginError').innerText = response.message;
                    }
                });
        }

        function checkRealtimeUpdate() {
            if (!currentUser) return;
            fetch(`${API_URL}?action=getState&username=${encodeURIComponent(currentUser)}`)
                .then(res => res.json())
                .then(async (state) => {
                    if (state && state.stateUpdate !== currentLocalState) {
                        currentLocalState = state.stateUpdate;
                        idMembreSession = state.idMembre;

                        if (lastLevel !== -1 && state.niveau > lastLevel) {
                            await piocherUneCarteTCGEnLocal(state.niveau - lastLevel);
                        }
                        lastLevel = state.niveau;

                        document.getElementById('displayLevel').innerText = "NIVEAU " + state.niveau;
                        document.getElementById('displayMoney').innerText = parseFloat(state.argent).toFixed(2) + " $";
                        document.getElementById('xpBar').style.width = Math.min(100, state.xp) + "%";
                        document.getElementById('xpText').innerText = state.xp + " / 100 XP";
                        
                        fetch(`${API_URL}?action=getTaches&username=${encodeURIComponent(currentUser)}&role=${userRole}`).then(res => res.json()).then(renderTaches);
                        fetchCollectionEtEchanges();
                    }
                });
        }

        async function piocherUneCarteTCGEnLocal(nbNiveauxGagnes) {
            let cardsToOpen = [];
            
            for (let k = 0; k < nbNiveauxGagnes; k++) {
                let success = false;
                let cardData = null;

                while (!success) {
                    let rNum = Math.floor(Math.random() * 264) + 1;
                    let candidateId = "swsh8-" + rNum;

                    if (!myLocalOwnedIds.includes(candidateId)) {
                        let imgUrl = `https://images.pokemontcg.io/swsh8/${rNum}_hires.png`;
                        
                        let isImageValid = await new Promise(resolve => {
                            let img = new Image();
                            img.onload = () => resolve(true);
                            img.onerror = () => resolve(false);
                            img.src = imgUrl;
                        });

                        if (isImageValid) {
                            success = true;
                            cardData = {
                                id: candidateId,
                                name: "CARTE COMPAGNONS #" + rNum,
                                img: imgUrl
                            };
                            myLocalOwnedIds.push(candidateId);
                        }
                    }
                }

                if (cardData) {
                    await fetch(`${API_URL}?action=enregistrerCarteLocal&idMembre=${idMembreSession}&username=${encodeURIComponent(currentUser)}&cardId=${cardData.id}&cardName=${encodeURIComponent(cardData.name)}&cardImg=${encodeURIComponent(cardData.img)}`);
                    cardsToOpen.push({ Nom_Pokemon: cardData.name, Image_URL: cardData.img });
                }
            }

            if (cardsToOpen.length > 0) {
                pendingCards = cardsToOpen;
                showNextRewardCard();
            }
        }

        function renderTaches(taches) {
            const container = document.getElementById('tachesList');
            container.innerHTML = "";
            taches.forEach(t => {
                let badgeColor = t.Statut === 'a faire' ? 'bg-danger' : (t.Statut === 'termine' ? 'bg-warning text-dark' : 'bg-success');
                let actionBtn = "";
                if (t.Statut === 'a faire' && userRole === 'joueur') actionBtn = `<button onclick="actionTache('${t.ID_Tache}', 'termine')" class="btn brawl-btn btn-green w-100 mt-2">C'EST FAIT !</button>`;
                else if (t.Statut === 'termine') actionBtn = userRole === 'admin' ? `<button onclick="actionTache('${t.ID_Tache}', 'approuve')" class="btn brawl-btn btn-yellow w-100 mt-2">APPROUVER ✅</button>` : `<p class="text-warning mt-2 mb-0 fw-bold text-center">En attente...</p>`;

                container.innerHTML += `<div class="col-md-6 col-lg-4 animate__animated animate__fadeInUp"><div class="brawl-card p-3"><div class="d-flex justify-content-between align-items-start mb-2"><span class="badge ${badgeColor} brawl-font">${t.Statut.toUpperCase()}</span><div><span class="badge badge-xp brawl-badge me-1">+${t.Recompense_XP} XP</span><span class="badge badge-money brawl-badge">+${parseFloat(t.Recompense_Argent).toFixed(2)}$</span></div></div><h4 class="fw-bold my-3 text-light">${t.Description}</h4><small class="text-muted d-block mb-1">Pour : <strong>${t.Assigne_A}</strong></small>${actionBtn}</div></div>`;
            });
        }

        function actionTache(id, statut) { fetch(`${API_URL}?action=changerStatut&id=${id}&statut=${statut}`).then(() => checkRealtimeUpdate()); }

        // LE MOTEUR DE TRI LOCAL ABSOLU ET TOUT-TERRAIN
        function fetchCollectionEtEchanges() {
            if (userRole === 'admin') return;
            fetch(`${API_URL}?action=getCollection&username=${encodeURIComponent(currentUser)}`)
                .then(res => res.json())
                .then(toutesLesCartesDuSheets => {
                    const grid = document.getElementById('pokemonGrid');
                    const select = document.getElementById('tradeMyCardSelect');
                    grid.innerHTML = ""; 
                    select.innerHTML = "";
                    myLocalOwnedIds = [];

                    if (!Array.isArray(toutesLesCartesDuSheets) || toutesLesCartesDuSheets.length === 0) {
                        grid.innerHTML = `<div class="col-12 text-center py-5 text-muted fw-bold">Aucune carte... Complète tes tâches pour ouvrir ton premier booster ! 🏁</div>`;
                        return;
                    }

                    // FILTRAGE LOCAL PARFAIT : On trie nous-mêmes la liste brute reçue du Sheets !
                    const mesCartesFiltrees = toutesLesCartesDuSheets.filter(row => {
                        let joueurDansLaFeuille = row.Nom_Joueur || row.Nom || row.nom || row.Joueur || row.joueur || row.NOM_JOUEUR || row.Assigne_A || "";
                        return joueurDansLaFeuille.toString().toLowerCase() === currentUser.toLowerCase();
                    });

                    mesCartesFiltrees.forEach(c => {
                        let trueImg = c.Image_URL || c.Image || c.url || c.IMAGE_URL || c.image_url || c.image || "";
                        let trueName = c.Nom_Pokemon || c.Nom || c.name || c.NOM_POKEMON || c.nom_pokemon || c.Description || "Carte Sans Nom";
                        let trueId = c.Pokemon_API_ID || c.ID || c.id || c.POKEMON_API_ID || c.pokemon_api_id || c.ID_Piece || "ID_Inconnu";

                        if (trueImg) {
                            myLocalOwnedIds.push(String(trueId));
                            grid.innerHTML += `
                                <div class="col text-center">
                                    <div class="pokemon-card-wrapper animate__animated animate__fadeIn">
                                        <img src="${trueImg}" class="pokemon-card-img" alt="Carte Pokemon">
                                        <p class="mt-2 text-warning font-weight-bold brawl-font mb-0 text-center" style="font-size:0.95rem; -webkit-text-stroke: 1px #000;">${trueName}</p>
                                    </div>
                                </div>`;
                            select.innerHTML += `<option value="${trueId}">${trueName}</option>`;
                        }
                    });

                    if (grid.innerHTML.trim() === "") {
                        grid.innerHTML = `<div class="col-12 text-center py-5 text-muted fw-bold">Aucune carte... Complète tes tâches pour ouvrir ton premier booster ! 🏁</div>`;
                    }
                }).catch(err => {
                    console.error("Erreur d'affichage galerie locale: ", err);
                });

            fetch(`${API_URL}?action=getEchanges&username=${encodeURIComponent(currentUser)}`).then(res => res.json()).then(echanges => {
                const list = document.getElementById('echangesList'); list.innerHTML = "";
                echanges.forEach(ex => {
                    let badgeColor = ex.Statut === 'en_attente' ? 'bg-warning text-dark' : (ex.Statut === 'accepte' ? 'bg-success' : 'bg-danger');
                    list.innerHTML += `<div class="alert alert-secondary d-flex justify-content-between align-items-center"><span>De <b>${ex.Demandeur}</b> à <b>${ex.Receveur}</b> (Carte ID: ${ex.Carte_Offerte_ID})</span> <span class="badge ${badgeColor}">${ex.Statut.toUpperCase()}</span></div>`;
                    if (ex.Receveur === currentUser && ex.Statut === 'en_attente' && !checkedTrades.includes(ex.ID_Echange)) { checkedTrades.push(ex.ID_Echange); ouvrirLiveModalEchange(ex); }
                    if (ex.Demandeur === currentUser && ex.Statut === 'refuse' && !checkedTrades.includes(ex.ID_Echange)) { checkedTrades.push(ex.ID_Echange); alert(`🚨 Offre d'échange refusée par ${ex.Receveur} !`); }
                });
            });
        }

        function ouvrirLiveModalEchange(trade) {
            document.getElementById('tradeDecisionText').innerText = `${trade.Demandeur} te propose un échange en direct ! Il souhaite acquérir une de tes cartes. Acceptes-tu l'échange ?`;
            const m = new bootstrap.Modal(document.getElementById('tradeDecisionModal'));
            document.getElementById('btnAcceptTrade').onclick = () => repondreAuDeal(trade.ID_Echange, 'accepte', m);
            document.getElementById('btnRefuseTrade').onclick = () => repondreAuDeal(trade.ID_Echange, 'refuse', m);
            m.show();
        }

        function repondreAuDeal(id, dec, instance) { fetch(`${API_URL}?action=repondreEchange&id=${id}&statut=${dec}`).then(() => { instance.hide(); checkRealtimeUpdate(); }); }
        
        function proposerEchange() {
            const cible = document.getElementById('tradeTargetSelect').value, maCarte = document.getElementById('tradeMyCardSelect').value;
            if (!cible || !maCarte) return alert("Assure-toi de choisir un joueur ET une carte à offrir !");
            fetch(`${API_URL}?action=creerEchange&demandeur=${encodeURIComponent(currentUser)}&receveur=${encodeURIComponent(cible)}&maCarte=${maCarte}`).then(() => { alert("Proposition envoyée !"); checkRealtimeUpdate(); });
        }

        function showNextRewardCard() {
            if (pendingCards.length === 0) { bootstrap.Modal.getInstance(document.getElementById('rewardModal')).hide(); return; }
            const c = pendingCards.shift();
            
            let trueImg = c.Image_URL || c.Image || c.url || c.IMAGE_URL || c.image_url || c.image;
            let trueName = c.Nom_Pokemon || c.Nom || c.name || c.NOM_POKEMON || c.nom_pokemon || c.Description;

            document.getElementById('rewardCardImg').src = trueImg;
            document.getElementById('rewardCardName').innerText = trueName.toUpperCase();
            document.getElementById('rewardNextBtn').innerText = pendingCards.length > 0 ? "SUIVANT !" : "FERMER !";
            new bootstrap.Modal(document.getElementById('rewardModal')).show();
        }

        function nextRewardCard() { showNextRewardCard(); }
        function creerNouvelleTache() {
            const desc = document.getElementById('taskDesc').value, xp = document.getElementById('taskXp').value, money = document.getElementById('taskMoney').value, assign = document.getElementById('taskAssignSelect').value;
            fetch(`${API_URL}?action=ajouterTache&desc=${encodeURIComponent(desc)}&xp=${xp}&money=${money}&assign=${encodeURIComponent(assign)}`).then(() => { alert("Mission lancée !"); document.getElementById('taskDesc').value = ""; checkRealtimeUpdate(); });
        }
        function creerMembreAdmin() {
            const nom = document.getElementById('newMemberName').value; if(!nom) return;
            fetch(`${API_URL}?action=creerMembre&nom=${encodeURIComponent(nom)}`).then(() => { alert("Joueur ajouté !"); document.getElementById('newMemberName').value = ""; fetchMembresPourListes(); });
        }
    </script>
</body>
</html>
